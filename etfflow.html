function ul(arr,neg){if(!arr||!arr.length)return '<div class="none">—</div>';var h='<ul>';for(var i=0;i<arr.length;i++){var x=arr[i];var v=x[2];var s=neg?('−'+Math.round(Math.abs(v)).toLocaleString()+'張'):((v>0?'+':'')+Math.round(v).toLocaleString()+'張');h+='<li><b>'+x[0]+' '+x[1]+'</b><span>'+s+'</span></li>';}return h+'</ul>';}
function card(title,x){var cnt=(x['new'].length+x.add.length+x.red.length+x['del'].length);
 return '<div class="etf"><h2>'+title+' <small>('+cnt+' 檔異動)</small></h2><div class="grid">'
  +'<div class="q new"><h3>新增建倉 '+x['new'].length+'</h3>'+ul(x['new'])+'</div>'
  +'<div class="q add"><h3>加碼 '+x.add.length+'</h3>'+ul(x.add)+'</div>'
  +'<div class="q red"><h3>減碼 '+x.red.length+'</h3>'+ul(x.red)+'</div>'
  +'<div class="q del"><h3>清空出清 '+x['del'].length+'</h3>'+ul(x['del'],true)+'</div></div></div>';}
function show(d){var o=P.data[d]||{};var keys=Object.keys(o).sort();var b=document.getElementById('body');
 if(!keys.length){b.innerHTML='<div class="empty">當日無異動資料</div>';document.getElementById('meta').textContent='交易日 '+d;return;}
 var h='';for(var k=0;k<keys.length;k++){var e=keys[k];h+=card(e+' '+(P.etfnames[e]||''),o[e]);}
 b.innerHTML=h;document.getElementById('meta').textContent='交易日 '+d+' ・ '+keys.length+' 檔ETF有異動';}
function showETF(e){var b=document.getElementById('body');var h='';var cnt=0;
 for(var i=P.dates.length-1;i>=0;i--){var d=P.dates[i];var x=(P.data[d]||{})[e];if(!x)continue;cnt++;h+=card(d,x);}
 b.innerHTML=h||'<div class="empty">這檔ETF近期無異動</div>';
 document.getElementById('meta').textContent=e+' '+(P.etfnames[e]||'')+' ・ '+cnt+' 個交易日有異動';}

 function tbl(arr,lab,hc){var h='<h3 class="'+hc+'">'+lab+' '+arr.length+'</h3><table class="sec"><thead><tr><th style="text-align:center">族群(點看成分股)</th><th>淨張(加減碼合計)</th><th>異動檔次</th></tr></thead><tbody>';

  return h+'</tbody></table>';}

 document.getElementById('meta').textContent='交易日 '+d+' ・ 全部ETF加減碼依成分股族群加總 ・ 點族群看成分股';}

 var h='<button onclick="showSector(_secDate)" style="margin:0 0 10px;padding:6px 12px;border:1px solid #b9c4d6;border-radius:6px;background:#fff;cursor:pointer">◀ 返回族群列表</button>';
